<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>Projetos p5</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="gallery-page">
    <header class="topbar">
      <h1>Projetos p5</h1>
      <p>Escolha um projeto para testar.</p>

      <div class="filters-wrap">
        <div class="filters">
          <div class="filter-group">
            <label for="chapter-filter">Capítulo:</label>
            <select id="chapter-filter">
              <option value="all">Todos os capítulos</option>
            </select>
          </div>

          <div class="filter-group">
            <span class="filter-label">Tipo:</span>

            <label class="checkbox-option">
              <input
                type="checkbox"
                name="type-filter"
                value="activity"
                checked
              />
              <span>Atividade</span>
            </label>

            <label class="checkbox-option">
              <input
                type="checkbox"
                name="type-filter"
                value="challenge"
                checked
              />
              <span>Desafio</span>
            </label>

            <label class="checkbox-option">
              <input
                type="checkbox"
                name="type-filter"
                value="rework"
                checked
              />
              <span>Rework</span>
            </label>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section id="project-list" class="project-grid"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
